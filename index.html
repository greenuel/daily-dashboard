<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{background:#0b0b10;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#13131c}::-webkit-scrollbar-thumb{background:#2e2e42;border-radius:4px}
    input[type="number"]::-webkit-inner-spin-button{opacity:0.4}
    input,select,button{font-family:inherit}
    input[type="time"]::-webkit-calendar-picker-indicator,
    input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.5);cursor:pointer}
    @keyframes fadeIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback} = React;

/* ‚îÄ‚îÄ‚îÄ local storage ‚îÄ‚îÄ‚îÄ */
const ls = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
};

/* ‚îÄ‚îÄ‚îÄ Supabase sync ‚îÄ‚îÄ‚îÄ */
const SB = {
  _url:'', _key:'',
  init(url,key){this._url=url;this._key=key},
  ok(){return !!(this._url&&this._key)},
  headers(){return{apikey:this._key,Authorization:`Bearer ${this._key}`,'Content-Type':'application/json'}},
  async pull(){
    if(!this.ok())return null;
    try{
      const r=await fetch(`${this._url}/rest/v1/dashboard?select=key,value`,{headers:this.headers()});
      if(!r.ok)return null;
      const rows=await r.json();
      return rows.reduce((a,r)=>({...a,[r.key]:r.value}),{});
    }catch{return null}
  },
  async pushAll(data){
    if(!this.ok())return false;
    try{
      const rows=Object.entries(data).map(([key,value])=>({key,value}));
      const r=await fetch(`${this._url}/rest/v1/dashboard`,{method:'POST',headers:{...this.headers(),Prefer:'resolution=merge-duplicates'},body:JSON.stringify(rows)});
      return r.ok;
    }catch{return false}
  },
};

/* ‚îÄ‚îÄ‚îÄ helpers ‚îÄ‚îÄ‚îÄ */
const todayStr  = ()=>new Date().toISOString().split('T')[0];
const fmtHM     = s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return`${h}h ${m}m`};
const fmtHMS    = s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?`${h}h ${m}m`:m>0?`${m}m ${sc}s`:`${sc}s`};
const timeToMin = t=>{if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m};
const minDiff   = (a,b)=>{let d=timeToMin(b)-timeToMin(a);if(d<0)d+=1440;return d};
const normTime  = (t,ap)=>{if(!t)return'';const p=t.match(/(\d{1,2}):(\d{2})/);if(!p)return'';let h=+p[1],m=+p[2];if(ap){const u=ap.trim().toUpperCase();if(u==='PM'&&h!==12)h+=12;if(u==='AM'&&h===12)h=0}return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`};
const extractTimes=text=>{const re=/\b(\d{1,2}:\d{2})\s*(AM|PM)?\b/gi,seen=new Set(),out=[];let m;while((m=re.exec(text))!==null){const t=normTime(m[1],m[2]);if(t&&!seen.has(t)){seen.add(t);out.push(t)}}return out};

/* ‚îÄ‚îÄ‚îÄ Claude prompts ‚îÄ‚îÄ‚îÄ */
const PROMPTS = {
  sleep:`Extract sleep data from this screenshot. Return ONLY a JSON object, no other text:
{"bedtime":"HH:MM","wakeTime":"HH:MM","hoursSlept":number}
Use 24-hour time. hoursSlept is a decimal (e.g. 7.5). If you can't find it: {"error":"reason"}.`,
  diet:`Extract nutrition info from this screenshot. Return ONLY JSON:
{"calories":number,"protein":number,"carbs":number,"fat":number}
Integers only, no units. If missing: {"error":"reason"}.`,
  work:`Extract work session start and end times. Return ONLY JSON:
{"startTime":"HH:MM","endTime":"HH:MM"}
24-hour time. If not found: {"error":"reason"}.`,
  schedule:`Extract the event title and times. Return ONLY JSON:
{"title":"string","startTime":"HH:MM","endTime":"HH:MM"}
24-hour time. If not found: {"error":"reason"}.`,
};

/* ‚îÄ‚îÄ‚îÄ free OCR parsers ‚îÄ‚îÄ‚îÄ */
const parseOCR = {
  sleep:text=>{
    let hoursSlept=null;
    const dur=text.match(/(\d+)\s*h(?:r|our)?s?\s*(\d+)?\s*m(?:in)?/i);
    if(dur)hoursSlept=+(+dur[1]+(+(dur[2]||0)/60)).toFixed(1);
    const times=extractTimes(text);
    const eve=times.filter(t=>{const h=+t.split(':')[0];return h>=18||h<=4});
    const mor=times.filter(t=>{const h=+t.split(':')[0];return h>=4&&h<=12});
    return{bedtime:eve[0]||times[0]||'',wakeTime:mor[mor.length-1]||times[times.length-1]||'',hoursSlept:hoursSlept||''};
  },
  diet:text=>{
    const n=(...ps)=>{for(const p of ps){const m=text.match(p);if(m)return+m[1]||''}return''};
    return{calories:n(/(\d+)\s*k?cal/i,/[Cc]alories?\D{0,3}(\d+)/),protein:n(/[Pp]rotein\D{0,3}(\d+)/),carbs:n(/[Cc]arbs?\D{0,3}(\d+)/,/[Cc]arbohydrates?\D{0,3}(\d+)/),fat:n(/\bFat\D{0,3}(\d+)/i)};
  },
  work:text=>{const t=extractTimes(text);return{startTime:t[0]||'',endTime:t[t.length-1]||''}},
  schedule:text=>{
    const times=extractTimes(text);
    const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.match(/^\d{1,2}:\d{2}/i)&&l.length>2);
    return{title:lines[0]||'',startTime:times[0]||'',endTime:times[times.length-1]||''};
  },
};

/* ‚îÄ‚îÄ‚îÄ ICS parser ‚îÄ‚îÄ‚îÄ */
const icsToEvents=text=>{
  const norm=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const lines=[];let prev='';
  for(const l of norm.split('\n')){if(l.match(/^[ \t]/))prev+=l.slice(1);else{if(prev)lines.push(prev);prev=l}}
  if(prev)lines.push(prev);
  const parseDT=str=>{const val=str.includes(':')?str.split(':').slice(1).join(':'):str;const s=val.replace(/Z$/,'');const allDay=s.length===8;return{date:`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`,time:`${s.slice(9,11)||'00'}:${s.slice(11,13)||'00'}`,allDay}};
  const events=[];let cur=null;
  for(const l of lines){
    if(l==='BEGIN:VEVENT'){cur={};continue}if(l==='END:VEVENT'){if(cur?.summary)events.push(cur);cur=null;continue}if(!cur)continue;
    if(l.match(/^SUMMARY/i))cur.summary=l.replace(/^SUMMARY[^:]*:/i,'');
    else if(l.match(/^DTSTART/i))cur.start=parseDT(l);
    else if(l.match(/^DTEND/i))cur.end=parseDT(l);
  }
  return events;
};

/* ‚îÄ‚îÄ‚îÄ primitives ‚îÄ‚îÄ‚îÄ */
const Card=({children,style})=><div style={{background:'#13131c',border:'1px solid #22223a',borderRadius:14,padding:20,...style}}>{children}</div>;
const ST=({children,style})=><div style={{fontSize:12,fontWeight:700,color:'#5a5a8a',textTransform:'uppercase',letterSpacing:'0.09em',marginBottom:14,...style}}>{children}</div>;
const PB=({value,max,color='#6366f1',label,unit='',showLabel=true})=>{
  const pct=max>0?Math.min(100,value/max*100):0,over=value>max;
  return<div style={{marginBottom:10}}>
    {showLabel&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:5,color:'#7878a8'}}><span>{label}</span><span style={{color:over?'#ef4444':'#a0a0c8'}}>{value}{unit} <span style={{color:'#4a4a6a'}}>/ {max}{unit}</span></span></div>}
    <div style={{background:'#1e1e2e',borderRadius:99,height:7,overflow:'hidden'}}><div style={{height:'100%',borderRadius:99,background:over?'#ef4444':color,width:`${pct}%`,transition:'width 0.4s ease',boxShadow:`0 0 8px ${over?'#ef444455':color+'44'}`}}/></div>
  </div>;
};
const Inp=({label,style,...p})=><div style={{marginBottom:12,...style}}>
  {label&&<div style={{fontSize:12,color:'#6c6c9a',marginBottom:5,fontWeight:600}}>{label}</div>}
  <input style={{width:'100%',background:'#0b0b10',border:'1px solid #22223a',borderRadius:9,padding:'9px 13px',color:'#e2e8f0',fontSize:14,outline:'none'}}
    onFocus={e=>e.target.style.borderColor='#6366f188'} onBlur={e=>e.target.style.borderColor='#22223a'} {...p}/>
</div>;
const Sel=({label,children,style,...p})=><div style={{marginBottom:12,...style}}>
  {label&&<div style={{fontSize:12,color:'#6c6c9a',marginBottom:5,fontWeight:600}}>{label}</div>}
  <select style={{width:'100%',background:'#0b0b10',border:'1px solid #22223a',borderRadius:9,padding:'9px 13px',color:'#e2e8f0',fontSize:14,outline:'none'}} {...p}>{children}</select>
</div>;
const Btn=({children,variant='primary',size='md',style,...p})=>{
  const bg={primary:'#6366f1',success:'#10b981',danger:'#ef4444',ghost:'#22223a'}[variant]||'#6366f1';
  return<button style={{background:bg,color:'#fff',border:'none',borderRadius:9,cursor:'pointer',padding:size==='sm'?'6px 13px':'10px 20px',fontSize:size==='sm'?13:14,fontWeight:600,transition:'all 0.15s',opacity:p.disabled?0.45:1,boxShadow:`0 2px 10px ${bg}33`,...style}}
    onMouseEnter={e=>{if(!p.disabled)e.currentTarget.style.filter='brightness(1.12)'}} onMouseLeave={e=>e.currentTarget.style.filter=''} {...p}>{children}</button>;
};
const Badge=({children,color})=><span style={{background:color+'22',color,border:`1px solid ${color}44`,borderRadius:6,padding:'2px 9px',fontSize:12,fontWeight:600}}>{children}</span>;
const Spin=()=><div style={{width:14,height:14,border:'2px solid #fff4',borderTopColor:'#fff',borderRadius:'50%',animation:'spin 0.7s linear infinite',display:'inline-block',verticalAlign:'middle',marginRight:7}}/>;

/* ‚îÄ‚îÄ‚îÄ Donut Chart ‚îÄ‚îÄ‚îÄ */
const DonutChart=({protein,carbs,fat})=>{
  const total=protein+carbs+fat,r=58,sw=22,sz=160,cx=80,cy=80,C=2*Math.PI*r;
  const segs=[{v:protein,color:'#6366f1',label:'Protein'},{v:carbs,color:'#10b981',label:'Carbs'},{v:fat,color:'#f59e0b',label:'Fat'}];
  let cum=0;const arcs=segs.map(s=>{const frac=total>0?s.v/total:0;const a={...s,frac,prev:cum};cum+=frac;return a});
  if(!total)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:sz,color:'#3a3a5a',fontSize:13}}>No macros logged</div>;
  return<div style={{display:'flex',alignItems:'center',gap:18}}>
    <svg width={sz} height={sz} style={{flexShrink:0}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1e1e2e" strokeWidth={sw}/>
      <g transform={`rotate(-90 ${cx} ${cy})`}>{arcs.map((a,i)=><circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={a.color} strokeWidth={sw} strokeDasharray={`${a.frac*C} ${C}`} strokeDashoffset={-(a.prev*C)}/>)}</g>
      <text x={cx} y={cy-7} textAnchor="middle" fill="#e2e8f0" style={{fontSize:22,fontWeight:700}}>{total}g</text>
      <text x={cx} y={cy+12} textAnchor="middle" fill="#4a4a6a" style={{fontSize:11}}>macros</text>
    </svg>
    <div style={{flex:1}}>{segs.map(s=><div key={s.label} style={{display:'flex',alignItems:'center',gap:9,marginBottom:8}}><div style={{width:10,height:10,borderRadius:3,background:s.color,flexShrink:0}}/><span style={{color:'#7878a8',fontSize:12,flex:1}}>{s.label}</span><span style={{color:'#e2e8f0',fontWeight:600,fontSize:13}}>{s.v}g</span><span style={{color:'#4a4a6a',fontSize:11}}>{total>0?Math.round(s.v/total*100):0}%</span></div>)}</div>
  </div>;
};

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   SCREENSHOT HELPER
   Uses Claude API if key set, else free Tesseract OCR
‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
const ScreenshotHelper=({title,hint,section,apiKey,onClose,onAutoFill,children})=>{
  const [img,setImg]=useState(null);
  const [state,setState]=useState('idle'); // idle|loading|done|error
  const [note,setNote]=useState('');
  const fileRef=useRef();
  useEffect(()=>{const fn=e=>{if(e.key==='Escape')onClose()};window.addEventListener('keydown',fn);return()=>window.removeEventListener('keydown',fn)},[onClose]);

  const handleFile=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setImg(ev.target.result);setState('idle');setNote('')};r.readAsDataURL(f)};

  const run=async()=>{
    if(!img)return;
    setState('loading');
    if(apiKey){
      setNote('Analyzing with Claude AI‚Ä¶');
      try{
        const b64=img.split(',')[1],mt=img.match(/data:([^;]+)/)?.[1]||'image/jpeg';
        const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
          body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:512,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:b64}},{type:'text',text:PROMPTS[section]||'Extract data and return as JSON.'}]}]})});
        const json=await res.json();
        if(!res.ok)throw new Error(json.error?.message||'API error');
        const match=json.content[0].text.match(/\{[\s\S]*?\}/);
        if(!match)throw new Error('No JSON found');
        const parsed=JSON.parse(match[0]);
        if(parsed.error)throw new Error(parsed.error);
        onAutoFill(parsed);setState('done');setNote('‚úì Auto-filled with Claude AI');
      }catch(e){setState('error');setNote('Error: '+e.message)}
    }else{
      setNote('Downloading OCR engine (first time ~10MB)‚Ä¶');
      try{
        const{data:{text}}=await Tesseract.recognize(img,'eng',{logger:m=>{if(m.status==='recognizing text')setNote(`Reading‚Ä¶ ${Math.round(m.progress*100)}%`)}});
        const parsed=parseOCR[section]?.(text)||{};
        const ok=Object.values(parsed).some(v=>v!==''&&v!=null);
        if(ok){onAutoFill(parsed);setState('done');setNote('‚úì Auto-filled (free OCR ‚Äî double-check values)')}
        else{setState('error');setNote('Couldn\'t read data. Add a Claude API key in ‚öô Settings for much better results.')}
      }catch(e){setState('error');setNote('OCR error: '+e.message)}
    }
  };

  return<div style={{position:'fixed',inset:0,background:'#000c',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
    <div style={{background:'#13131c',border:'1px solid #22223a',borderRadius:16,width:'100%',maxWidth:1040,maxHeight:'90vh',display:'flex',flexDirection:'column',animation:'fadeIn 0.18s ease'}}>
      <div style={{padding:'16px 22px',borderBottom:'1px solid #22223a',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <div><span style={{fontWeight:700,fontSize:16}}>üì∏ {title}</span>{hint&&<div style={{fontSize:12,color:'#5a5a8a',marginTop:2}}>{hint}</div>}</div>
        <button onClick={onClose} style={{background:'none',border:'none',color:'#5a5a8a',cursor:'pointer',fontSize:20}}>‚úï</button>
      </div>
      <div style={{display:'flex',flex:1,overflow:'hidden',minHeight:0}}>
        <div style={{flex:1,borderRight:'1px solid #22223a',display:'flex',flexDirection:'column',overflow:'auto'}}>
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>
          {img?(
            <div style={{flex:1,padding:16,position:'relative',overflow:'auto'}}>
              <img src={img} alt="ss" style={{width:'100%',borderRadius:10,display:'block'}}/>
              <button onClick={()=>{setImg(null);setState('idle');setNote('');fileRef.current.value=''}} style={{position:'absolute',top:22,right:22,background:'#0b0b10cc',border:'1px solid #22223a',color:'#e2e8f0',borderRadius:7,padding:'4px 10px',cursor:'pointer',fontSize:12}}>Change</button>
            </div>
          ):(
            <div onClick={()=>fileRef.current.click()} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,cursor:'pointer',padding:32,color:'#3a3a5a'}}
              onMouseEnter={e=>e.currentTarget.style.background='#0f0f18'} onMouseLeave={e=>e.currentTarget.style.background=''}>
              <div style={{fontSize:48}}>üñº</div>
              <div style={{fontSize:15,fontWeight:600,color:'#5a5a8a'}}>Click to upload screenshot</div>
              <div style={{fontSize:12,color:'#3a3a5a'}}>JPG ¬∑ PNG ¬∑ HEIC ¬∑ WEBP</div>
            </div>
          )}
          {img&&<div style={{padding:'12px 16px',borderTop:'1px solid #1e1e2e',flexShrink:0}}>
            <Btn onClick={run} disabled={state==='loading'} style={{width:'100%'}}>
              {state==='loading'?<><Spin/>Reading‚Ä¶</>:apiKey?'‚ú® Auto-fill with Claude AI':'‚ú® Auto-fill (free OCR)'}
            </Btn>
            {note&&<div style={{marginTop:8,fontSize:12,lineHeight:1.5,color:state==='done'?'#10b981':state==='error'?'#f59e0b':'#6c6c9a'}}>{note}</div>}
          </div>}
        </div>
        <div style={{flex:1,overflow:'auto',padding:22}}>{children}</div>
      </div>
    </div>
  </div>;
};

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   DIET LOG
‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
const DietLog=({meals,goals,onAdd,onDelete,onGoals,apiKey})=>{
  const blank={name:'',calories:'',protein:'',carbs:'',fat:'',mealType:'breakfast'};
  const [form,setForm]=useState(blank);
  const [showGoals,setShowGoals]=useState(false);
  const [gf,setGf]=useState(goals);
  const [ss,setSs]=useState(false);
  useEffect(()=>setGf(goals),[goals]);
  const td=meals.filter(m=>m.date===todayStr());
  const tot=td.reduce((a,m)=>({cal:a.cal+m.calories,pro:a.pro+m.protein,car:a.car+m.carbs,fat:a.fat+m.fat}),{cal:0,pro:0,car:0,fat:0});
  const mtC={breakfast:'#f59e0b',lunch:'#10b981',dinner:'#6366f1',snack:'#ec4899'};
  const fill=d=>setForm(p=>({...p,calories:d.calories||p.calories,protein:d.protein||p.protein,carbs:d.carbs||p.carbs,fat:d.fat||p.fat}));
  const submit=(e,close)=>{e.preventDefault();if(!form.name||!form.calories)return;onAdd({id:Date.now(),date:todayStr(),...form,calories:+form.calories||0,protein:+form.protein||0,carbs:+form.carbs||0,fat:+form.fat||0});setForm(blank);close?.()};
  const MF=({onSubmit})=><form onSubmit={onSubmit}>
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12}}>
      <Inp label="Meal Name" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="e.g. Chicken & rice" required/>
      <Sel label="Type" value={form.mealType} onChange={e=>setForm(p=>({...p,mealType:e.target.value}))}><option value="breakfast">Breakfast</option><option value="lunch">Lunch</option><option value="dinner">Dinner</option><option value="snack">Snack</option></Sel>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:12}}>
      <Inp label="Calories" type="number" value={form.calories} onChange={e=>setForm(p=>({...p,calories:e.target.value}))} placeholder="0"/>
      <Inp label="Protein (g)" type="number" value={form.protein} onChange={e=>setForm(p=>({...p,protein:e.target.value}))} placeholder="0"/>

const PAL=['#6366f1','#10b981','#f59e0b','#ec4899','#06b6d4','#8b5cf6','#f97316'];
const HH=64,DS=6,DE=24,TH=DE-DS;
const Schedule=({events,onAdd,onAddMany,onDelete,apiKey})=>{
  const blank={title:'',startTime:'',endTime:'',date:todayStr(),color:PAL[0]};
  const [form,setForm]=useState(blank);

  const te=events.filter(e=>e.date===todayStr()).sort((a,b)=>a.startTime.localeCompare(b.startTime));
  const toY=t=>{if(!t)return 0;const[h,m]=t.split(':').map(Number);return((Math.max(DS*60,Math.min(DE*60,h*60+m))-DS*60)/60)*HH};
  const fill=d=>setForm(p=>({...p,title:d.title||p.title,startTime:d.startTime||p.startTime,endTime:d.endTime||p.endTime}));
  const sub=(e,close)=>{e.preventDefault();if(!form.title||!form.startTime||!form.endTime)return;onAdd({id:Date.now(),...form});setForm(blank);close?.()};
  const importICS=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const p=icsToEvents(ev.target.result);const m=p.filter(x=>x.start?.date&&x.end?.date&&!x.start.allDay).map(x=>({id:Date.now()+Math.random(),title:x.summary,date:x.start.date,startTime:x.start.time,endTime:x.end.time,color:PAL[Math.floor(Math.random()*PAL.length)],fromCal:true}));if(!m.length){setMsg('Only all-day events found.');return}onAddMany(m);setMsg(`‚úì Imported ${m.length} events`);setTimeout(()=>setMsg(''),4000)}catch{setMsg('Could not parse .ics file.')}};r.readAsText(f);e.target.value=''};
  const nowY=useMemo(()=>{const n=new Date();return toY(`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`)});
  const EF=({onSubmit})=><form onSubmit={onSubmit}><div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12}}><Inp label="Title" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} placeholder="Event title" required/><Inp label="Date" type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/></div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}><Inp label="Start" type="time" value={form.startTime} onChange={e=>setForm(p=>({...p,startTime:e.target.value}))} required/><Inp label="End" type="time" value={form.endTime} onChange={e=>setForm(p=>({...p,endTime:e.target.value}))} required/><div><div style={{fontSize:12,color:'#6c6c9a',marginBottom:5,fontWeight:600}}>Color</div><div style={{display:'flex',gap:7,flexWrap:'wrap'}}>{PAL.map(c=><div key={c} onClick={()=>setForm(p=>({...p,color:c}))} style={{width:26,height:26,borderRadius:'50%',background:c,cursor:'pointer',outline:form.color===c?'3px solid #fff':'3px solid transparent',outlineOffset:2,transition:'all 0.15s'}}/>)}</div></div></div><Btn type="submit">Add Event</Btn></form>;
  return<div style={{display:'flex',flexDirection:'column',gap:16}}>
    {ss&&<ScreenshotHelper title="Add Event from Screenshot" section="schedule" apiKey={apiKey} onClose={()=>setSs(false)} onAutoFill={fill}><ST>Event Details</ST><EF onSubmit={e=>sub(e,()=>setSs(false))}/></ScreenshotHelper>}

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div><div style={{fontWeight:700,color:'#e2e8f0',marginBottom:3}}>üìÖ Google Calendar Sync</div><div style={{fontSize:12,color:'#5a5a8a',lineHeight:1.6}}>In Google Calendar ‚Üí Settings ‚Üí Import &amp; Export ‚Üí Export ‚Üí download .ics ‚Üí import below</div></div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}><input ref={icsRef} type="file" accept=".ics,text/calendar" style={{display:'none'}} onChange={importICS}/><Btn variant="ghost" onClick={()=>icsRef.current.click()}>Import .ics file</Btn>{msg&&<div style={{fontSize:12,color:msg.startsWith('‚úì')?'#10b981':'#f59e0b'}}>{msg}</div>}</div>
      </div>
    </Card>
    <Card><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><ST style={{marginBottom:0}}>Add Event</ST><Btn size="sm" variant="ghost" onClick={()=>setSs(true)}>üì∏ Fill from Screenshot</Btn></div><EF onSubmit={sub}/></Card>
    <Card><ST>Today's Timeline</ST>
      <div style={{position:'relative',paddingLeft:54,marginTop:4}}>
        <div style={{position:'relative',height:TH*HH}}>
          {Array.from({length:TH+1},(_,i)=>{const h=DS+i;const l=h===0||h===24?'12am':h===12?'12pm':h<12?`${h}am`:`${h-12}pm`;return<div key={h} style={{position:'absolute',left:0,right:0,top:i*HH}}><span style={{position:'absolute',left:-52,top:-8,fontSize:11,color:'#3a3a5a',width:44,textAlign:'right'}}>{l}</span><div style={{borderTop:i===0?'1px solid #2e2e42':'1px solid #1a1a2a',width:'100%'}}/></div>})}
          <div style={{position:'absolute',left:0,right:0,top:nowY,borderTop:'2px solid #ef444488',zIndex:10}}><div style={{position:'absolute',left:-6,top:-5,width:10,height:10,borderRadius:'50%',background:'#ef4444'}}/></div>
          {te.map(ev=>{const top=toY(ev.startTime),height=Math.max(toY(ev.endTime)-top,28);return<div key={ev.id} style={{position:'absolute',left:4,right:0,top,height,background:ev.color+'20',border:`1.5px solid ${ev.color}66`,borderLeft:`4px solid ${ev.color}`,borderRadius:8,padding:'5px 10px',overflow:'hidden'}}><div style={{fontWeight:700,fontSize:13,color:ev.color}}>{ev.title}</div>{height>32&&<div style={{fontSize:11,color:'#5a5a8a'}}>{ev.startTime} ‚Äì {ev.endTime}</div>}<button onClick={()=>onDelete(ev.id)} style={{position:'absolute',top:4,right:6,background:'none',border:'none',color:'#3a3a5a',cursor:'pointer',fontSize:12}}>‚úï</button></div>})}
          {!te.length&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'#3a3a5a',fontSize:13}}>No events today</div>}
        </div>
      </div>
    </Card>
  </div>;
};

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   SUMMARY
‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
const Summary=({meals,sleep,work,events,goals,timerEl,timerOn})=>{
  const td=meals.filter(m=>m.date===todayStr());
  const cal=td.reduce((a,m)=>a+m.calories,0),pro=td.reduce((a,m)=>a+m.protein,0),car=td.reduce((a,m)=>a+m.carbs,0),fat=td.reduce((a,m)=>a+m.fat,0);
  const ls2=sleep.length>0?sleep[sleep.length-1]:null;
  const wkSt=new Date();wkSt.setDate(wkSt.getDate()-wkSt.getDay());
  const twSec=work.filter(s=>s.date===todayStr()).reduce((a,s)=>a+s.durationSeconds,0)+(timerOn?timerEl:0);
  const wkSec=work.filter(s=>s.date>=wkSt.toISOString().split('T')[0]).reduce((a,s)=>a+s.durationSeconds,0)+(timerOn?timerEl:0);
  const now=new Date(),ns=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const te=events.filter(e=>e.date===todayStr()).sort((a,b)=>a.startTime.localeCompare(b.startTime));
  const up=te.filter(e=>e.endTime>=ns),cur=up.find(e=>e.startTime<=ns),nxt=up.find(e=>e.startTime>ns);
  const sq=h=>h>=8?'#10b981':h>=7?'#6366f1':h>=6?'#f59e0b':'#ef4444';
  return<div style={{display:'flex',flexDirection:'column',gap:16}}>
    <div style={{fontSize:13,color:'#5a5a8a'}}>{now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16}}>
      <Card><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}><span style={{fontSize:18}}>üçΩ</span><span style={{fontSize:12,color:'#6c6c9a',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em'}}>Calories</span></div><div style={{fontSize:34,fontWeight:800,color:'#e2e8f0',lineHeight:1,marginBottom:2}}>{cal.toLocaleString()}</div><div style={{fontSize:12,color:'#4a4a6a',marginBottom:10}}>of {goals.calories.toLocaleString()}</div><PB value={cal} max={goals.calories} color="#6366f1" showLabel={false}/></Card>
      <Card><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}><span style={{fontSize:18}}>üåô</span><span style={{fontSize:12,color:'#6c6c9a',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em'}}>Sleep</span></div>{ls2?<><div style={{fontSize:34,fontWeight:800,lineHeight:1,marginBottom:2,color:sq(ls2.hoursSlept)}}>{ls2.hoursSlept}h</div><div style={{fontSize:12,color:'#4a4a6a',marginBottom:10}}>{ls2.bedtime||'?'} ‚Üí {ls2.wakeTime||'?'}</div><PB value={ls2.hoursSlept} max={9} color={sq(ls2.hoursSlept)} showLabel={false}/></>:<div style={{color:'#3a3a5a',fontSize:13,marginTop:8}}>No data</div>}</Card>
      <Card><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}><span style={{fontSize:18}}>‚è±</span><span style={{fontSize:12,color:'#6c6c9a',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em'}}>Work</span></div><div style={{fontSize:34,fontWeight:800,color:'#e2e8f0',lineHeight:1,marginBottom:2}}>{fmtHM(twSec)}</div><div style={{fontSize:12,color:'#4a4a6a',marginBottom:10}}>{fmtHM(wkSec)} this week</div><PB value={twSec/3600} max={8} color="#10b981" showLabel={false}/></Card>
    </div>
    <Card><ST>Macros</ST><div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16}}><PB value={pro} max={goals.protein} color="#6366f1" label="Protein" unit="g"/><PB value={car} max={goals.carbs} color="#10b981" label="Carbs" unit="g"/><PB value={fat} max={goals.fat} color="#f59e0b" label="Fat" unit="g"/></div></Card>
    <Card><ST>Today's Schedule</ST>{!te.length?<div style={{color:'#3a3a5a',fontSize:13,padding:'12px 0'}}>No events scheduled</div>:te.map(ev=>{const ic=ev.startTime<=ns&&ev.endTime>=ns,ip=ev.endTime<ns;return<div key={ev.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 13px',background:'#0b0b10',borderRadius:9,marginBottom:8,borderLeft:`4px solid ${ip?'#2e2e42':ev.color}`,opacity:ip?0.45:1}}><div style={{flex:1}}><div style={{fontWeight:600,color:'#e2e8f0'}}>{ev.title}</div><div style={{fontSize:12,color:'#4a4a6a',marginTop:2}}>{ev.startTime} ‚Äì {ev.endTime}</div></div>{ic&&<Badge color="#10b981">NOW</Badge>}{!ic&&ev.id===nxt?.id&&<Badge color="#6366f1">NEXT</Badge>}</div>})}</Card>
  </div>;
};

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   APP
‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
const TABS=[{id:'summary',label:'Summary',icon:'‚óà'},{id:'diet',label:'Diet',icon:'üçΩ'},{id:'sleep',label:'Sleep',icon:'üåô'},{id:'work',label:'Work',icon:'‚è±'},{id:'schedule',label:'Schedule',icon:'üìÖ'}];

const App=()=>{
  const [tab,setTab]       = useState('summary');
  const [meals,setMeals]   = useState(()=>ls.get('meals',[]));
  const [sleep,setSleep]   = useState(()=>ls.get('sleep',[]));
  const [work,setWork]     = useState(()=>ls.get('work',[]));
  const [events,setEvents] = useState(()=>ls.get('events',[]));
  const [goals,setGoals]   = useState(()=>ls.get('goals',{calories:2000,protein:150,carbs:200,fat:65}));
  const [conf,setConf]     = useState(()=>ls.get('conf',{anthropicKey:'',sbUrl:'',sbKey:''}));
  const [showSet,setShowSet] = useState(false);
  const [syncSt,setSyncSt]  = useState('idle'); // idle|syncing|synced|error
  const [elapsed,setElapsed] = useState(()=>{const r=ls.get('tmrRunning',false),s=ls.get('tmrStart',null);return r&&s?Math.floor((Date.now()-s)/1000):0});
  const timerOn = ls.get('tmrRunning',false);
  const syncRef = useRef(null);

  /* timer for Summary */
  useEffect(()=>{if(!timerOn)return;const id=setInterval(()=>setElapsed(Math.floor((Date.now()-ls.get('tmrStart',Date.now()))/1000)),1000);return()=>clearInterval(id)},[timerOn]);

  /* init Supabase + pull on mount */
  useEffect(()=>{
    const c=ls.get('conf',{});
    if(c.sbUrl&&c.sbKey){
      SB.init(c.sbUrl,c.sbKey);
      setSyncSt('syncing');
      SB.pull().then(data=>{
        if(data){
          if(data.meals)  setMeals(data.meals);
          if(data.sleep)  setSleep(data.sleep);
          if(data.work)   setWork(data.work);
          if(data.events) setEvents(data.events);
          if(data.goals)  setGoals(data.goals);
          setSyncSt('synced');
        } else setSyncSt('error');
      });
    }
  },[]);

  /* persist to localStorage immediately */
  useEffect(()=>ls.set('meals',meals),[meals]);
  useEffect(()=>ls.set('sleep',sleep),[sleep]);
  useEffect(()=>ls.set('work',work),[work]);
  useEffect(()=>ls.set('events',events),[events]);
  useEffect(()=>ls.set('goals',goals),[goals]);
  useEffect(()=>ls.set('conf',conf),[conf]);

  /* debounced Supabase sync */
  useEffect(()=>{
    if(!conf.sbUrl||!conf.sbKey)return;
    SB.init(conf.sbUrl,conf.sbKey);
    clearTimeout(syncRef.current);
    setSyncSt('syncing');
    syncRef.current=setTimeout(async()=>{
      const ok=await SB.pushAll({meals,sleep,work,events,goals});
      setSyncSt(ok?'synced':'error');
    },2000);
    return()=>clearTimeout(syncRef.current);
  },[meals,sleep,work,events,goals]);

  const syncDot = {idle:'#3a3a5a',syncing:'#f59e0b',synced:'#10b981',error:'#ef4444'}[syncSt];
  const syncTip = {idle:'Not configured',syncing:'Syncing‚Ä¶',synced:'Synced across devices ‚úì',error:'Sync error ‚Äî check Supabase settings'}[syncSt];

  return<div style={{minHeight:'100vh',background:'#0b0b10'}}>
    <header style={{position:'sticky',top:0,zIndex:100,background:'#0f0f17',borderBottom:'1px solid #1e1e2e'}}>
      <div style={{maxWidth:980,margin:'0 auto',display:'flex',alignItems:'center',padding:'0 24px'}}>
        <div style={{fontWeight:800,fontSize:17,color:'#e2e8f0',marginRight:8,padding:'18px 0',letterSpacing:'-0.4px'}}>Daily<span style={{color:'#6366f1'}}>.</span></div>
        <nav style={{display:'flex',flex:1,gap:2}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'20px 15px',border:'none',background:'none',cursor:'pointer',fontSize:13,fontWeight:tab===t.id?700:500,color:tab===t.id?'#a5b4fc':'#4a4a6a',borderBottom:`2px solid ${tab===t.id?'#6366f1':'transparent'}`,transition:'all 0.15s',display:'flex',alignItems:'center',gap:6}}><span>{t.icon}</span>{t.label}</button>)}
        </nav>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {conf.sbUrl&&<div title={syncTip} style={{width:8,height:8,borderRadius:'50%',background:syncDot,boxShadow:`0 0 6px ${syncDot}`,animation:syncSt==='syncing'?'pulse 1s ease infinite':'none',flexShrink:0}}/>}
          <button onClick={()=>setShowSet(v=>!v)} style={{background:showSet?'#22223a':'none',border:'none',cursor:'pointer',color:'#4a4a6a',fontSize:18,padding:'8px 10px',borderRadius:8}}>‚öô</button>
        </div>
      </div>

      {showSet&&<div style={{borderTop:'1px solid #1e1e2e',background:'#0d0d16',padding:'20px 24px'}}>
        <div style={{maxWidth:980,margin:'0 auto'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>

            {/* Claude API */}
            <div>
              <div style={{fontWeight:700,color:'#e2e8f0',marginBottom:4}}>‚ú® Claude AI (screenshot reading)</div>
              <div style={{fontSize:12,color:'#5a5a8a',marginBottom:12,lineHeight:1.6}}>Get an API key at <strong style={{color:'#a5b4fc'}}>console.anthropic.com</strong> ‚Üí API Keys. ~$0.001/screenshot.</div>
              <Inp label="Anthropic API Key" type="password" value={conf.anthropicKey} onChange={e=>setConf(p=>({...p,anthropicKey:e.target.value}))} placeholder="sk-ant-‚Ä¶"/>
            </div>

            {/* Supabase */}
            <div>
              <div style={{fontWeight:700,color:'#e2e8f0',marginBottom:4}}>‚òÅÔ∏è Supabase (phone sync ‚Äî free)</div>
              <div style={{fontSize:12,color:'#5a5a8a',marginBottom:12,lineHeight:1.6}}>
                1. Create free account at <strong style={{color:'#a5b4fc'}}>supabase.com</strong><br/>
                2. New project ‚Üí SQL Editor ‚Üí run:<br/>
                <code style={{background:'#1e1e2e',padding:'6px 10px',borderRadius:6,display:'block',marginTop:6,fontSize:11,color:'#10b981',lineHeight:1.8}}>
                  create table dashboard (key text primary key, value jsonb);<br/>
                  alter table dashboard enable row level security;<br/>
                  create policy "open" on dashboard for all to anon using (true) with check (true);
                </code>
                3. Settings ‚Üí API ‚Üí copy URL &amp; anon key below
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <Inp label="Project URL" value={conf.sbUrl} onChange={e=>setConf(p=>({...p,sbUrl:e.target.value}))} placeholder="https://xxxx.supabase.co"/>
                <Inp label="Anon Key" type="password" value={conf.sbKey} onChange={e=>setConf(p=>({...p,sbKey:e.target.value}))} placeholder="eyJ‚Ä¶"/>
              </div>
            </div>
          </div>
          <div style={{marginTop:16,display:'flex',gap:12,alignItems:'center'}}>
            <Btn onClick={()=>{ls.set('conf',conf);SB.init(conf.sbUrl,conf.sbKey);setShowSet(false)}}>Save Settings</Btn>
            {syncSt==='error'&&<span style={{color:'#ef4444',fontSize:13}}>Sync error ‚Äî double-check your Supabase URL and anon key, and make sure you ran the SQL above.</span>}
            {syncSt==='synced'&&<span style={{color:'#10b981',fontSize:13}}>‚úì Syncing across devices</span>}
          </div>
        </div>
      </div>}
    </header>

    <main style={{maxWidth:980,margin:'0 auto',padding:24}}>
      {tab==='summary'  &&<Summary  meals={meals} sleep={sleep} work={work} events={events} goals={goals} timerEl={elapsed} timerOn={timerOn}/>}
      {tab==='diet'     &&<DietLog  meals={meals} goals={goals} onAdd={m=>setMeals(p=>[...p,m])} onDelete={id=>setMeals(p=>p.filter(m=>m.id!==id))} onGoals={setGoals} apiKey={conf.anthropicKey}/>}
      {tab==='sleep'    &&<SleepTracker entries={sleep} onAdd={e=>setSleep(p=>[...p,e])} onDelete={id=>setSleep(p=>p.filter(e=>e.id!==id))} apiKey={conf.anthropicKey}/>}
      {tab==='work'     &&<WorkHours sessions={work} onAdd={s=>setWork(p=>[...p,s])} onDelete={id=>setWork(p=>p.filter(s=>s.id!==id))} apiKey={conf.anthropicKey}/>}
      {tab==='schedule' &&<Schedule events={events} onAdd={e=>setEvents(p=>[...p,e])} onAddMany={es=>setEvents(p=>[...p,...es])} onDelete={id=>setEvents(p=>p.filter(e=>e.id!==id))} apiKey={conf.anthropicKey}/>}
    </main>
  </div>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
